<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <section class="todo-card">
      <div class="hero">
        <p class="eyebrow">Daily Focus</p>
        <h1>Todo List</h1>
        <p class="subtitle">Keep track of what matters and pick up where you left off.</p>
      </div>

      <form class="todo-form" id="todo-form">
        <label class="sr-only" for="task-input">Add a task</label>
        <input
          id="task-input"
          class="task-input"
          type="text"
          name="task"
          placeholder="Add a new task..."
          autocomplete="off"
          required
        >
        <button class="add-button" type="submit">Add Task</button>
      </form>

      <div class="list-header">
        <h2>Tasks</h2>
        <span id="task-count" class="task-count">0 items</span>
      </div>

      <ul id="task-list" class="task-list" aria-live="polite"></ul>

      <p id="empty-state" class="empty-state">No tasks yet. Add one to get started.</p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
